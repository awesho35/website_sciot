services:
  api:
    build: ./api
    command: sh -c "python manage.py migrate && gunicorn sciot_api.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120 --access-logfile - --error-logfile -"
    volumes:
      - api_media:/app/media
      - api_static:/app/staticfiles
      - api_data:/app/data
    env_file:
      - .env
    restart: always

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: always

  nginx:
    image: nginx:alpine
    ports:
      - "8082:80"   # Exposed to host — Ondes HOST proxies port 8082
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - api_static:/app/staticfiles:ro
      - api_media:/app/media:ro
    depends_on:
      - api
      - frontend
    restart: always
    command: "/bin/sh -c 'while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g \"daemon off;\"'"

volumes:
  api_media:
  api_static:
  api_data:
