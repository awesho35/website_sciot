<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jouer au Club - Le Sciøt Cial Club</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <header id="main-header"></header>

    <main>
        <div class="bg-dark text-white py-5 position-relative overflow-hidden" style="min-height: 30vh; display: flex; align-items: center;">
            <img src="ressources/542230372_763789346415345_4832126966196685008_n.jpg" class="position-absolute top-0 start-0 w-100 h-100 object-fit-cover opacity-25" style="filter: blur(4px);">
            <div class="container position-relative text-center">
                <h1 class="display-4"><b>Toi aussi, joue au club</b></h1>
                <div class="bg-primary mx-auto" style="height: 4px; width: 80px;"></div>
            </div>
        </div>

        <section class="py-5">
            <div class="container py-4">
                <div class="row justify-content-center">
                    <div class="col-lg-8">
                        <p class="lead text-center mb-5">
                            Tu as un projet musical et tu veux fouler les planches du Sciøt ? <br>
                            Remplis ce formulaire et Maud & Kiwi reviendront vers toi si le feeling passe !
                        </p>

                        <!-- Success / error feedback -->
                        <div id="form-feedback" class="d-none alert mb-4"></div>

                        <form id="candidature-form" class="row g-4">
                            <div class="col-md-6">
                                <label>Nom du Groupe / Artiste</label>
                                <input type="text" name="group_name" class="form-control" placeholder="Votre groupe" required>
                            </div>
                            <div class="col-md-6">
                                <label>Style Musical</label>
                                <input type="text" name="style" class="form-control" placeholder="Ex: Funk / Rock / DJ Set" required>
                            </div>

                            <div class="col-12">
                                <label>Lien d'écoute (Spotify, Soundcloud, YouTube...)</label>
                                <input type="url" name="listen_url" class="form-control" placeholder="Indispensable pour qu'on puisse vous écouter" required>
                            </div>
                            <div class="col-md-6">
                                <label>Instagram / Facebook</label>
                                <input type="text" name="social" class="form-control" placeholder="@votre_groupe">
                            </div>
                            <div class="col-md-6">
                                <label>Nombre de personnes sur scène</label>
                                <select name="size" class="form-select">
                                    <option value="" selected disabled>Choisissez...</option>
                                    <option>Solo / Duo</option>
                                    <option>Trio / Quatuor</option>
                                    <option>Grand Groupe (5+)</option>
                                </select>
                            </div>

                            <div class="col-12">
                                <label>Présentation &amp; Matériel (Bio courte + besoins techniques)</label>
                                <textarea name="bio" class="form-control" rows="5" placeholder="Dites-nous qui vous êtes et si vous êtes autonomes en sono/backline..."></textarea>
                            </div>

                            <div class="col-md-12">
                                <label>Budget / Cachet souhaité (€)</label>
                                <input type="text" name="budget" class="form-control" placeholder="Indiquez une fourchette ou votre tarif habituel">
                            </div>

                            <div class="col-12 text-center mt-5">
                                <button type="submit" id="submit-btn" class="btn btn-primary btn-lg px-5 py-3 shadow-sm border-0">
                                    Envoyer ma candidature
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer id="main-footer" class="glass-bar footer-shadow py-3 mt-auto"></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/main.js"></script>
    <script>
        document.getElementById('candidature-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const feedback = document.getElementById('form-feedback');
            const data = Object.fromEntries(new FormData(this).entries());

            // Build the message body from all fields
            const message = [
                `Groupe / Artiste : ${data.group_name}`,
                `Style musical : ${data.style}`,
                `Lien d'écoute : ${data.listen_url}`,
                `Instagram / Facebook : ${data.social || 'NC'}`,
                `Nombre de personnes : ${data.size || 'NC'}`,
                `Bio & matériel : ${data.bio || 'NC'}`,
                `Budget / cachet : ${data.budget || 'NC'}`,
            ].join('\n');

            btn.disabled = true;
            btn.textContent = 'Envoi en cours...';
            feedback.classList.add('d-none');

            try {
                await SciotAPI.sendContactMessage({
                    name: data.group_name,
                    email: 'candidature@sciot.fr',  // placeholder — no email field in form
                    subject: `Candidature artiste : ${data.group_name}`,
                    message,
                });
                feedback.className = 'alert alert-success';
                feedback.textContent = '✅ Candidature envoyée ! Maud & Kiwi reviendront vers vous prochainement.';
                this.reset();
            } catch (err) {
                feedback.className = 'alert alert-danger';
                feedback.textContent = '❌ Une erreur est survenue, merci de réessayer.';
                console.error(err);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Envoyer ma candidature';
                feedback.classList.remove('d-none');
                feedback.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        });
    </script>
</body>
</html>
