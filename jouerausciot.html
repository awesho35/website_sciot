<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jouer au Club - Le Sciøt Cial Club</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <header class="sticky-top">
        <nav class="navbar navbar-expand-lg shadow-sm glass-bar">
            <div class="container">
                <a class="navbar-brand text-primary" href="index.html">
                    <i class="bi bi-megaphone-fill me-2"></i>LE SCIøT CIAL CLUB
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navContent">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navContent">
                    <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                        <li class="nav-item"><a class="nav-link" href="index.html">Accueil</a></li>
                        <li class="nav-item"><a class="nav-link" href="programmation.html">Programmation</a></li>
                        <li class="nav-item"><a class="nav-link" href="menu.html">Menu</a></li>
                        <li class="nav-item"><a class="nav-link active" href="jouerausciot.html">Jouer ici</a></li>
                    </ul>
                    <div class="d-flex ms-lg-4 align-items-center">
                        <a href="#" class="text-primary fs-4 me-3"><i class="bi bi-instagram"></i></a>
                        <a href="#" class="text-primary fs-4 me-3"><i class="bi bi-facebook"></i></a>
                        <a href="#" class="text-primary fs-4 me-3"><i class="bi bi-youtube"></i></a>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <div class="bg-dark text-white py-5 position-relative overflow-hidden" style="min-height: 30vh; display: flex; align-items: center;">
            <img src="542230372_763789346415345_4832126966196685008_n.jpg" class="position-absolute top-0 start-0 w-100 h-100 object-fit-cover opacity-25" style="filter: blur(4px);">
            <div class="container position-relative text-center">
                <h1 class="display-4"><b>Toi aussi, joue au club</b></h1>
                <div class="bg-primary mx-auto" style="height: 4px; width: 80px;"></div>
            </div>
        </div>

        <section class="py-5">
            <div class="container py-4">
                <div class="row justify-content-center">
                    <div class="col-lg-8">
                        <p class="lead text-center mb-5">
                            Tu as un projet musical et tu veux fouler les planches du Sciøt ? <br>
                            Remplis ce formulaire et Maud & Kiwi reviendront vers toi si le feeling passe !
                        </p>

                        <form action="#" method="POST" class="row g-4">
                            <div class="col-md-6">
                                <label>Nom du Groupe / Artiste</label>
                                <input type="text" class="form-control" placeholder="Votre groupe" required>
                            </div>
                            <div class="col-md-6">
                                <label>Style Musical</label>
                                <input type="text" class="form-control" placeholder="Ex: Funk / Rock / DJ Set" required>
                            </div>

                            <div class="col-12">
                                <label>Lien d'écoute (Spotify, Soundcloud, YouTube...)</label>
                                <input type="url" class="form-control" placeholder="Indispensable pour qu'on puisse vous écouter" required>
                            </div>
                            <div class="col-md-6">
                                <label>Instagram / Facebook</label>
                                <input type="text" class="form-control" placeholder="@votre_groupe">
                            </div>
                            <div class="col-md-6">
                                <label>Nombre de personnes sur scène</label>
                                <select class="form-select">
                                    <option selected disabled>Choisissez...</option>
                                    <option>Solo / Duo</option>
                                    <option>Trio / Quatuor</option>
                                    <option>Grand Groupe (5+)</option>
                                </select>
                            </div>

                            <div class="col-12">
                                <label>Présentation & Matériel (Bio courte + besoins techniques)</label>
                                <textarea class="form-control" rows="5" placeholder="Dites-nous qui vous êtes et si vous êtes autonomes en sono/backline..."></textarea>
                            </div>

                            <div class="col-md-12">
                                <label>Budget / Cachet souhaité (€)</label>
                                <input type="text" class="form-control" placeholder="Indiquez une fourchette ou votre tarif habituel">
                            </div>

                            <div class="col-12 text-center mt-5">
                                <button type="submit" class="btn btn-primary btn-lg px-5 py-3 shadow-sm border-0">
                                    Envoyer ma candidature
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="glass-bar footer-shadow py-3 mt-5">
        <div class="container text-center">
            <span class="small opacity-75 text-dark"><i>Sciotot >> Cotentin >> Normandie</i></span>
            <div class="mt-3">
                <a href="tel:0233042456" class="text-primary fw-bold mx-3">02 33 04 24 56</a>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
